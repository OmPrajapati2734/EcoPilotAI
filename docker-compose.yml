version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: ecopilot-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ecopilot
      POSTGRES_PASSWORD: ecopilotPassword2026
      POSTGRES_DB: ecopilot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ecopilot-api
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=database;Port=5432;Database=ecopilot_db;Username=ecopilot;Password=ecopilotPassword2026
      - Jwt__Key=superSecretEcoPilotJwtKeyWithSecureEntropy2026!
      - Jwt__Issuer=EcoPilotServer
      - Jwt__Audience=EcoPilotClient
      - Gemini__ApiKey=YOUR_GEMINI_API_KEY
    depends_on:
      - database

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ecopilot-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - backend

volumes:
  postgres_data:
